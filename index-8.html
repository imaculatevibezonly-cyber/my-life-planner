<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#18140f;
  --bg2:#211c15;
  --bg3:#2a241b;
  --bg4:#332c20;
  --border:#3a3226;
  --border2:#4a4234;
  --text:#f5ede0;
  --text2:#a89070;
  --text3:#6a5840;
  --accent:#c8a87a;
  --accent2:#b8946a;
  --accent-bg:rgba(200,168,122,0.12);
  --r:12px;--r-sm:8px;

  --work:#4a7cf7;--work-bg:rgba(74,124,247,0.15);--work-text:#93b4fb;
  --social:#3ec47a;--social-bg:rgba(62,196,122,0.15);--social-text:#7ddba5;
  --gf:#f74a8a;--gf-bg:rgba(247,74,138,0.15);--gf-text:#fb93b8;
  --personal:#a855f7;--personal-bg:rgba(168,85,247,0.15);--personal-text:#c493fb;
  --health:#f7974a;--health-bg:rgba(247,151,74,0.15);--health-text:#fbb876;
}

body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

.shell{display:flex;min-height:100vh;position:relative}

/* Sidebar */
.side{width:230px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 14px 24px;position:sticky;top:0;height:100vh;overflow-y:auto}
.side-logo{padding:6px 10px 24px;border-bottom:1px solid var(--border);margin-bottom:16px}
.side-logo-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--accent);letter-spacing:-0.01em;line-height:1.2}
.side-logo-sub{font-size:11px;color:var(--text3);margin-top:2px;font-family:'Inter',sans-serif;font-weight:400}
.side-label{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;padding:0 10px;margin-bottom:6px;margin-top:4px}
.side-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r-sm);border:none;background:transparent;color:var(--text2);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;width:100%;text-align:left;transition:all 0.15s;margin-bottom:2px}
.side-btn:hover{background:var(--bg3);color:var(--text)}
.side-btn.active{background:var(--accent-bg);color:var(--accent);border:1px solid rgba(200,168,122,0.2)}
.side-btn svg{width:15px;height:15px;flex-shrink:0}
.cat-item{display:flex;align-items:center;gap:9px;padding:7px 12px;border-radius:var(--r-sm);cursor:pointer;transition:all 0.12s;margin-bottom:1px}
.cat-item:hover{background:var(--bg3)}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cat-item-label{font-size:12px;color:var(--text2)}
.cat-item.off .cat-dot{opacity:0.2}
.cat-item.off .cat-item-label{color:var(--text3);text-decoration:line-through}

/* Main */
.content{flex:1;min-width:0;padding:32px 36px;overflow-y:auto}
.page{display:none}.page.active{display:block}

/* Page header */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px}
.ph-left h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--text);letter-spacing:-0.02em}
.ph-left p{font-size:12px;color:var(--text3);margin-top:3px;font-family:'JetBrains Mono',monospace}
.ph-right{display:flex;align-items:center;gap:8px;flex-shrink:0}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r-sm);font-size:13px;font-family:'Inter',sans-serif;font-weight:500;cursor:pointer;border:none;transition:all 0.15s}
.btn-primary{background:var(--accent);color:#1a1208}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn svg{width:13px;height:13px}

/* Toggle */
.toggle{display:flex;background:var(--bg3);border-radius:var(--r-sm);padding:3px;gap:2px;border:1px solid var(--border)}
.tgl{padding:5px 14px;font-size:12px;border:none;background:transparent;color:var(--text3);border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s}
.tgl.active{background:var(--accent);color:#1a1208;font-weight:500}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.stat-label{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:0.06em;margin-bottom:6px}
.stat-val{font-size:24px;font-weight:600;letter-spacing:-0.03em;color:var(--accent)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* Nav row */
.nav-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.nav-arr{width:30px;height:30px;border-radius:var(--r-sm);background:var(--bg2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;flex-shrink:0;color:var(--text2)}
.nav-arr:hover{background:var(--bg3);color:var(--text)}
.nav-arr svg{width:12px;height:12px}
.nav-per{font-size:13px;font-weight:500;min-width:160px;text-align:center;color:var(--text)}
.today-btn{padding:5px 12px;font-size:12px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-sm);cursor:pointer;color:var(--accent);font-family:'Inter',sans-serif;transition:all 0.15s;font-weight:500}
.today-btn:hover{background:var(--bg3)}

/* Day grid */
.day-grid{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.cal-grid{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}.cal-times{width:52px;flex-shrink:0;border-right:1px solid var(--border)}.cal-time-slot{height:80px;border-bottom:1px solid var(--border);padding:8px 8px 0 0;font-size:10px;color:var(--text3);text-align:right;font-family:monospace}.cal-time-slot:last-child{border-bottom:none}.cal-body{flex:1;position:relative}.cal-hour-line{position:absolute;left:0;right:0;height:1px;background:var(--border);pointer-events:none}.cal-ev{position:absolute;left:6px;right:6px;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:500;cursor:grab;user-select:none;overflow:hidden;box-sizing:border-box;min-height:28px}.cal-ev:active{cursor:grabbing}.cal-ev-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.cal-ev-time{font-size:10px;opacity:0.65;font-family:monospace;margin-top:1px}.cal-ev-del{position:absolute;top:4px;right:6px;width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.15s;cursor:pointer;border:none}.cal-ev:hover .cal-ev-del{opacity:1}.cal-ev-del svg{width:7px;height:7px;stroke:#fff;stroke-width:2.5;pointer-events:none}.cal-ev-resize{position:absolute;bottom:0;left:0;right:0;height:8px;cursor:ns-resize;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.15s}.cal-ev:hover .cal-ev-resize{opacity:1}.cal-ev-resize::after{content:"";width:20px;height:2px;background:currentColor;opacity:0.4;border-radius:1px}.cal-now-line{position:absolute;left:0;right:0;height:2px;background:#E24B4A;z-index:10;pointer-events:none}.cal-now-line::before{content:"";position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:#E24B4A}
.hr-row:last-child{border-bottom:none}
.hr-lbl{width:50px;padding:10px 10px 0 0;font-size:10px;color:var(--text3);text-align:right;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.hr-body{flex:1;padding:4px 8px;display:flex;flex-direction:column;gap:3px}
.ev-chip{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:none;text-align:left;width:100%;transition:opacity 0.15s;font-family:'Inter',sans-serif;position:relative}
.ev-chip:hover{opacity:0.8}
.ev-title{flex:1}
.ev-time{font-size:10px;opacity:0.6;font-family:'JetBrains Mono',monospace;font-weight:400;margin-right:24px}
.ev-del{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.15s}
.ev-chip:hover .ev-del{opacity:1}
.ev-del svg{width:8px;height:8px;stroke:#fff;stroke-width:2.5;pointer-events:none}

/* Week grid */
.week-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.week-grid{display:grid;grid-template-columns:44px repeat(7,1fr)}
.wg-corner{border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.wg-dh{font-size:10px;font-weight:500;color:var(--text3);text-align:center;padding:8px 4px;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.wg-dh:last-child{border-right:none}
.wg-dh.today{color:var(--accent);font-weight:700}
.wg-dh span{font-size:14px;font-weight:600;display:block;margin-top:1px}
.wg-hl{font-size:10px;color:var(--text3);text-align:right;padding:3px 6px 0 0;height:42px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);font-family:'JetBrains Mono',monospace}
.wg-cell{height:42px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);position:relative;overflow:hidden}
.wg-cell:last-child{border-right:none}
.wg-cell.today{background:rgba(200,168,122,0.04)}
.wg-ev{position:absolute;left:2px;right:2px;top:3px;border-radius:5px;padding:2px 5px;font-size:10px;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;transition:opacity 0.15s}
.wg-ev:hover{opacity:0.7}

/* Tasks */
.tasks-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.task-col{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.tc-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.tc-title{font-size:13px;font-weight:600;color:var(--text)}
.tc-count{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.task-list{padding:6px;min-height:60px}
.task-item{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;border-radius:var(--r-sm);transition:background 0.12s;cursor:pointer;position:relative}
.task-item:hover{background:var(--bg3)}
.tcheck{width:16px;height:16px;border-radius:5px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.tcheck.done{background:var(--accent);border-color:var(--accent)}
.tcheck.done::after{content:'';display:block;width:8px;height:4px;border-left:1.5px solid #1a1208;border-bottom:1.5px solid #1a1208;transform:rotate(-45deg) translate(1px,-1px)}
.task-body{flex:1;min-width:0}
.task-title{font-size:13px;line-height:1.4;color:var(--text)}
.task-title.done{text-decoration:line-through;color:var(--text3)}
.task-meta{display:flex;align-items:center;gap:6px;margin-top:3px}
.pri-badge{font-size:10px;font-weight:500;padding:1px 7px;border-radius:20px}
.pri-high{background:rgba(247,74,74,0.15);color:#f97c7c}
.pri-med{background:rgba(247,151,74,0.15);color:#fbb876}
.pri-low{background:var(--bg4);color:var(--text3)}
.task-del{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;opacity:0;transition:opacity 0.15s;flex-shrink:0;display:flex;align-items:center}
.task-item:hover .task-del{opacity:1}
.task-del:hover{color:#f97c7c}
.task-del svg{width:12px;height:12px}

/* Habits */
.habits-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.habit-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.habit-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.habit-name{font-size:13px;font-weight:500;color:var(--text)}
.habit-streak{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text3)}
.habit-week{display:flex;gap:4px}
.hday{flex:1;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'JetBrains Mono',monospace;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text3);transition:all 0.15s}
.hday.done{border-color:transparent;color:#1a1208}
.habit-labels{display:flex;gap:4px;margin-top:4px}
.habit-labels span{flex:1;text-align:center;font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.habit-footer{display:flex;justify-content:flex-end;margin-top:10px}
.habit-del{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif}
.habit-del:hover{color:#f97c7c}

/* Notes */
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.note-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;min-height:130px}
.note-ta{width:100%;border:none;background:transparent;resize:none;font-size:13px;font-family:'Inter',sans-serif;color:var(--text);outline:none;flex:1;line-height:1.6}
.note-ta::placeholder{color:var(--text3)}
.note-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.note-date{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.note-del{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif}
.note-del:hover{color:#f97c7c}

/* Finance */
.finance-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.finance-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.fc-title{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:16px}
.finance-full{grid-column:1/-1}
.donut-wrap{display:flex;align-items:center;gap:20px}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:8px}
.legend-item{display:flex;align-items:center;gap:8px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-label{font-size:12px;color:var(--text2);flex:1}
.legend-val{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text)}
.bar-chart{display:flex;flex-direction:column;gap:12px}
.bar-top{display:flex;justify-content:space-between;margin-bottom:4px}
.bar-label{font-size:12px;color:var(--text2)}
.bar-amount{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text)}
.bar-track{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px}
.insight-list{display:flex;flex-direction:column;gap:10px}
.insight-item{display:flex;align-items:flex-start;gap:10px;padding:12px;background:var(--bg3);border-radius:var(--r-sm)}
.insight-icon{font-size:16px;flex-shrink:0}
.insight-text{font-size:13px;color:var(--text2);line-height:1.6}
.insight-text strong{color:var(--accent);font-weight:500}

/* Modal */
.modal-back{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-back.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:24px;width:370px;max-width:calc(100vw - 32px);animation:su 0.18s ease;box-shadow:0 24px 60px rgba(0,0,0,0.5)}
@keyframes su{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.modal h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:18px}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:0.07em;margin-bottom:5px}
.field input,.field select{width:100%;padding:9px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-sm);font-size:13px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:border-color 0.15s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px}
.cat-opt{padding:8px;border-radius:var(--r-sm);font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid transparent;text-align:center;transition:all 0.15s;font-family:'Inter',sans-serif;background:var(--bg3);color:var(--text2)}
.pri-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:4px}
.pri-opt{padding:8px;border-radius:var(--r-sm);font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid transparent;text-align:center;transition:all 0.15s;font-family:'Inter',sans-serif;background:var(--bg3);color:var(--text2)}
.pri-opt.sel{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}

@media(max-width:700px){.side{display:none}.content{padding:20px 16px}.stats{grid-template-columns:1fr 1fr}.tasks-cols{grid-template-columns:1fr}.finance-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">

<aside class="side">
  <div class="side-logo">
    <div class="side-logo-name">My Planner</div>
    <div class="side-logo-sub">life · work · habits</div>
  </div>

  <div class="side-label">Menu</div>
  <button class="side-btn active" onclick="nav(this,'schedule')">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><line x1="5" y1="1" x2="5" y2="4"/><line x1="11" y1="1" x2="11" y2="4"/><line x1="2" y1="7" x2="14" y2="7"/></svg>
    Schedule
  </button>
  <button class="side-btn" onclick="nav(this,'tasks')">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><polyline points="5,8 7,10 11,6"/></svg>
    Tasks
  </button>
  <button class="side-btn" onclick="nav(this,'habits')">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><polyline points="5,8 7,10 11,6"/></svg>
    Habits
  </button>
  <button class="side-btn" onclick="nav(this,'notes')">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><line x1="5" y1="6" x2="11" y2="6"/><line x1="5" y1="9.5" x2="9" y2="9.5"/></svg>
    Notes
  </button>
  <button class="side-btn" onclick="nav(this,'finance')">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="2" y1="12" x2="2" y2="7"/><line x1="6" y1="12" x2="6" y2="4"/><line x1="10" y1="12" x2="10" y2="7"/><line x1="14" y1="12" x2="14" y2="2"/><line x1="1" y1="12" x2="15" y2="12"/></svg>
    Finance
  </button>

  <div class="side-label" style="margin-top:16px">Categories</div>
  <div id="cat-filters"></div>
</aside>

<main class="content">

  <section class="page active" id="pg-schedule">
    <div class="ph">
      <div class="ph-left"><h1 id="sched-title">Today</h1><p id="sched-date"></p></div>
      <div class="ph-right">
        <div class="toggle"><button class="tgl active" id="tgl-day" onclick="setView('day')">Day</button><button class="tgl" id="tgl-week" onclick="setView('week')">Week</button></div>
        <button class="btn btn-primary" onclick="openModal('event')">
          <svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="6.5" y1="1" x2="6.5" y2="12"/><line x1="1" y1="6.5" x2="12" y2="6.5"/></svg>Add event
        </button>
      </div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="nav-row">

    </div>

</main>
</div>

    <div class="field"><label>HABIT NAME</label><input type="text" id="h-name" placeholder="e.g. Morning run"></div>

    <div class="mfoot"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-primary" onclick="saveHabit()">Save</button></div>
  </div>

<script>
const CATS=[
  {id:'work',    label:'Work',    dot:'var(--work)',    bg:'var(--work-bg)',    text:'var(--work-text)'},
  {id:'social',  label:'Social',  dot:'var(--social)',  bg:'var(--social-bg)',  text:'var(--social-text)'},
  {id:'gf',      label:'Partner', dot:'var(--gf)',      bg:'var(--gf-bg)',      text:'var(--gf-text)'},
  {id:'personal',label:'Personal',dot:'var(--personal)',bg:'var(--personal-bg)',text:'var(--personal-text)'},
  {id:'health',  label:'Health',  dot:'var(--health)',  bg:'var(--health-bg)',  text:'var(--health-text)'},
];

const LD=(k,d)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d}catch{return d}};
const SV=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
function relDay(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function ds(d){return d.toISOString().slice(0,10);}
function todayDs(){return ds(new Date());}
function catById(id){return CATS.find(c=>c.id===id)||CATS[0];}

let events  = LD('lp4_ev',[
  {id:1,title:'Morning run',cat:'health',date:relDay(0),start:'07:00',end:'07:45'},
  {id:2,title:'Team standup',cat:'work',date:relDay(0),start:'09:30',end:'10:00'},
  {id:3,title:'Deep work',cat:'work',date:relDay(0),start:'10:00',end:'12:30'},
  {id:4,title:'Evening plans',cat:'gf',date:relDay(0),start:'19:00',end:'22:00'},
  {id:5,title:'Gym',cat:'health',date:relDay(1),start:'07:00',end:'08:00'},
  {id:6,title:'Friends catch up',cat:'social',date:relDay(2),start:'18:00',end:'20:00'},
]);
let tasks   = LD('lp4_tk',[
  {id:10,title:'Edit shoot footage',cat:'work',pri:'high',done:false},
  {id:11,title:'Write captions',cat:'work',pri:'med',done:false},
  {id:12,title:'Book restaurant',cat:'gf',pri:'med',done:false},
  {id:13,title:'Reply to brand emails',cat:'work',pri:'high',done:false},
]);
let habits  = LD('lp4_hb',[
  {id:20,name:'Morning run',cat:'health',done:{}},
  {id:21,name:'Read 20 mins',cat:'personal',done:{}},
  {id:22,name:'No phone before 9am',cat:'personal',done:{}},
]);
let notes   = LD('lp4_nt',[{id:30,text:'Ideas for this week:',created:new Date().toISOString()}]);
let finance = LD('lp4_fin',null);
let nid     = LD('lp4_nid',100);
let filters = new Set(CATS.map(c=>c.id));
let view    = 'day';
let curDate = new Date();
let selEvtCat="work", selTaskCat="work", selHabitCat="health", curPri="high";

function saveAll(){SV('lp4_ev',events);SV('lp4_tk',tasks);SV('lp4_hb',habits);SV('lp4_nt',notes);SV('lp4_nid',nid);if(finance)SV('lp4_fin',finance);}

function nav(btn,page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-'+page).classList.add('active');
  document.querySelectorAll('.side-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(page==='tasks')   renderTasks();
  if(page==='habits')  renderHabits();
  if(page==='notes')   renderNotes();
  if(page==='finance') renderFinance();
}

function buildFilters(){
  const el=document.getElementById('cat-filters');el.innerHTML='';
  CATS.forEach(c=>{
    const on=filters.has(c.id);
    const d=document.createElement('div');
    d.className='cat-item'+(on?'':' off');
    d.innerHTML=`<span class="cat-dot" style="background:${c.dot}"></span><span class="cat-item-label">${c.label}</span>`;
    d.onclick=()=>{if(filters.has(c.id))filters.delete(c.id);else filters.add(c.id);buildFilters();renderSched();};
    el.appendChild(d);
  });
}

function buildStats(){
  const now=new Date();
  const wd=now.getDay();const mon=new Date(now);mon.setDate(now.getDate()-((wd===0?7:wd)-1));
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const wk=events.filter(e=>{const d=new Date(e.date);return d>=mon&&d<=sun;});
  const tod=events.filter(e=>e.date===todayDs());
  const open=tasks.filter(t=>!t.done).length;
  const today=new Date();
  let topStreak=0;
  habits.forEach(h=>{let s=0;for(let i=0;i<60;i++){const d=new Date(today);d.setDate(today.getDate()-i);if((h.done||{})[ds(d)])s++;else break;}if(s>topStreak)topStreak=s;});
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">TODAY</div><div class="stat-val">${tod.length}</div><div class="stat-sub">events</div></div>
    <div class="stat"><div class="stat-label">THIS WEEK</div><div class="stat-val">${wk.length}</div><div class="stat-sub">scheduled</div></div>
    <div class="stat"><div class="stat-label">OPEN TASKS</div><div class="stat-val">${open}</div><div class="stat-sub">to do</div></div>
    <div class="stat"><div class="stat-label">BEST STREAK</div><div class="stat-val">${topStreak}</div><div class="stat-sub">days</div></div>
  `;
}

function renderSched(){
  buildStats();
  const isTod=ds(curDate)===todayDs();
  document.getElementById('sched-title').textContent=view==='week'?'This week':(isTod?'Today':fmtS(curDate));
  document.getElementById('sched-date').textContent=view==='week'?wkRange():fmtL(curDate);
  document.getElementById('nav-per').textContent=view==='week'?wkRange():fmtS(curDate);
  view==='day'?renderDay():renderWeek();
}

const SLOT=80; // px per hour
function timeToY(t){const[h,m]=(t||'0:0').split(':').map(Number);return(h-7)*SLOT+(m/60)*SLOT;}
function yToTime(y){const totalMins=Math.round((y/SLOT)*60)+7*60;const h=Math.floor(totalMins/60);const m=Math.round((totalMins%60)/5)*5;const hh=Math.max(7,Math.min(23,h));const mm=Math.min(55,m);return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');}
function fmtT(t){const[h,m]=t.split(':').map(Number);const ampm=h>=12?'pm':'am';const h12=h%12||12;return h12+(m>0?':'+String(m).padStart(2,'0'):'')+ampm;}

function renderDay(){
  const evts=events.filter(e=>e.date===ds(curDate)&&filters.has(e.cat));
  const hrs=Array.from({length:17},(_,i)=>i+7);
  const totalH=17*SLOT;

  // Time labels
  let timesHTML='';
  hrs.forEach(hr=>{
    const lbl=hr===12?'12pm':hr>12?(hr-12)+'pm':hr+'am';
    timesHTML+=`<div class="cal-time-slot">${lbl}</div>`;
  });

  // Hour lines
  let linesHTML='';
  hrs.forEach((hr,i)=>{linesHTML+=`<div class="cal-hour-line" style="top:${i*SLOT}px"></div>`;});

  // Now line
  const now=new Date();
  const nowY=(now.getHours()-7)*SLOT+(now.getMinutes()/60)*SLOT;
  const showNow=ds(curDate)===todayDs()&&nowY>=0&&nowY<=totalH;
  if(showNow) linesHTML+=`<div class="cal-now-line" style="top:${nowY}px"></div>`;

  // Events
  let evHTML='';
  evts.forEach(e=>{
    const c=catById(e.cat);
    const y=timeToY(e.start||'9:00');
    const endY=timeToY(e.end||'10:00');
    const h=Math.max(28,endY-y);
    evHTML+=`<div class="cal-ev" id="ev-${e.id}" data-id="${e.id}" style="top:${y}px;height:${h}px;background:${c.bg};color:${c.t||c.text}">
      <button class="cal-ev-del" onclick="delEvent(${e.id})"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="2" y1="2" x2="8" y2="8"/><line x1="8" y1="2" x2="2" y2="8"/></svg></button>
      <div class="cal-ev-title">${e.title}</div>
      <div class="cal-ev-time">${fmtT(e.start||'9:00')} – ${fmtT(e.end||'10:00')}</div>
      <div class="cal-ev-resize" data-resize="${e.id}"></div>
    </div>`;
  });

  document.getElementById('sched-view').innerHTML=
    `<div class="cal-grid">
      <div class="cal-times">${timesHTML}</div>
      <div class="cal-body" id="cal-body" style="height:${totalH}px">${linesHTML}${evHTML}</div>
    </div>`;

  initCalDrag();
}

function initCalDrag(){
  const body=document.getElementById('cal-body');
  if(!body) return;

  // Drag to move
  body.querySelectorAll('.cal-ev').forEach(el=>{
    el.addEventListener('mousedown',e=>{
      if(e.target.closest('.cal-ev-resize')||e.target.closest('.cal-ev-del')) return;
      e.preventDefault();
      const id=parseInt(el.dataset.id);
      const ev=events.find(x=>x.id===id);if(!ev) return;
      const startY=e.clientY;
      const origTop=parseInt(el.style.top);
      const h=parseInt(el.style.height);
      el.style.opacity='0.8';el.style.zIndex='100';
      function onMove(e){
        const dy=e.clientY-startY;
        const newTop=Math.max(0,Math.min(17*SLOT-h,origTop+dy));
        el.style.top=newTop+'px';
        const newStart=yToTime(newTop);
        const dur=timeToMins(ev.end)-timeToMins(ev.start);
        const newEnd=minsToTime(timeToMins(newStart)+Math.max(30,dur));
        el.querySelector('.cal-ev-time').textContent=fmtT(newStart)+' – '+fmtT(newEnd);
      }
      function onUp(e){
        const dy=e.clientY-startY;
        const newTop=Math.max(0,Math.min(17*SLOT-h,origTop+dy));
        const newStart=yToTime(newTop);
        const dur=timeToMins(ev.end)-timeToMins(ev.start);
        ev.start=newStart;
        ev.end=minsToTime(timeToMins(newStart)+Math.max(30,dur));
        el.style.opacity='1';el.style.zIndex='';
        saveAll();renderDay();
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('mouseup',onUp);
      }
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
    });
  });

  // Drag to resize
  body.querySelectorAll('[data-resize]').forEach(handle=>{
    handle.addEventListener('mousedown',e=>{
      e.preventDefault();e.stopPropagation();
      const id=parseInt(handle.dataset.resize);
      const ev=events.find(x=>x.id===id);if(!ev) return;
      const el=document.getElementById('ev-'+id);
      const startY=e.clientY;
      const origH=parseInt(el.style.height);
      const top=parseInt(el.style.top);
      function onMove(e){
        const dy=e.clientY-startY;
        const newH=Math.max(28,origH+dy);
        el.style.height=newH+'px';
        const newEnd=yToTime(top+newH);
        el.querySelector('.cal-ev-time').textContent=fmtT(ev.start)+' – '+fmtT(newEnd);
      }
      function onUp(e){
        const dy=e.clientY-startY;
        const newH=Math.max(28,origH+dy);
        ev.end=yToTime(top+newH);
        saveAll();renderDay();
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('mouseup',onUp);
      }
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
    });
  });
}

function timeToMins(t){const[h,m]=(t||'0:0').split(':').map(Number);return h*60+m;}
function minsToTime(m){const h=Math.floor(m/60);const mm=m%60;return String(Math.min(23,h)).padStart(2,'0')+':'+String(mm).padStart(2,'0');}

function renderWeek(){
  const wd=curDate.getDay();const mon=new Date(curDate);mon.setDate(curDate.getDate()-((wd===0?7:wd)-1));
  const days=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
  const dn=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const hrs=Array.from({length:14},(_,i)=>i+8);
  let h='<div class="week-wrap"><div class="week-grid"><div class="wg-corner"></div>';
  days.forEach((d,i)=>{const t=ds(d)===todayDs();h+=`<div class="wg-dh${t?' today':''}">${dn[i]}<span>${d.getDate()}</span></div>`;});
  hrs.forEach(hr=>{
    const lbl=hr===12?'12p':hr>12?(hr-12)+'p':hr+'a';
    h+=`<div class="wg-hl">${lbl}</div>`;
    days.forEach(d=>{
      const t=ds(d)===todayDs();
      const evts=events.filter(e=>e.date===ds(d)&&filters.has(e.cat)&&parseInt((e.start||'0:0').split(':')[0])===hr);
      h+=`<div class="wg-cell${t?' today':''}">`;
      evts.forEach(e=>{const c=catById(e.cat);h+=`<div class="wg-ev" style="background:${c.bg};color:${c.text}" onclick="delEvent(${e.id})" title="Click to delete: ${e.title}">${e.title}</div>`;});
      h+=`</div>`;
    });
  });
  h+='</div></div>';
  document.getElementById('sched-view').innerHTML=h;
}

function delEvent(id){if(confirm('Delete this event?')){events=events.filter(e=>e.id!==id);saveAll();renderSched();}}
function wkRange(){const wd=curDate.getDay();const mon=new Date(curDate);mon.setDate(curDate.getDate()-((wd===0?7:wd)-1));const sun=new Date(mon);sun.setDate(mon.getDate()+6);return `${mon.getDate()} – ${sun.getDate()} ${sun.toLocaleString('en-GB',{month:'long'})} ${sun.getFullYear()}`;}
function fmtL(d){return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function fmtS(d){return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});}
function setView(v){view=v;document.getElementById('tgl-day').className='tgl'+(v==='day'?' active':'');document.getElementById('tgl-week').className='tgl'+(v==='week'?' active':'');renderSched();}
function nudge(n){if(view==='day')curDate.setDate(curDate.getDate()+n);else curDate.setDate(curDate.getDate()+n*7);renderSched();}
function jumpToday(){curDate=new Date();renderSched();}

function renderTasks(){
  const open=tasks.filter(t=>!t.done).sort((a,b)=>({high:0,med:1,low:2}[a.pri]-{high:0,med:1,low:2}[b.pri]));
  const done=tasks.filter(t=>t.done);
  document.getElementById('tasks-view').innerHTML=`
    <div class="task-col"><div class="tc-hdr"><span class="tc-title">To do</span><span class="tc-count">${open.length} left</span></div><div class="task-list">${open.map(tHTML).join('')}</div></div>
    <div class="task-col"><div class="tc-hdr"><span class="tc-title">Done</span><span class="tc-count">${done.length} completed</span></div><div class="task-list">${done.map(tHTML).join('')}</div></div>
  `;
}
function tHTML(t){
  const c=catById(t.cat);
  const pc={high:'pri-high',med:'pri-med',low:'pri-low'}[t.pri];
  const pl={high:'High',med:'Medium',low:'Low'}[t.pri];
  return `<div class="task-item" onclick="toggleTask(${t.id})">
    <div class="tcheck${t.done?' done':''}"></div>
    <div class="task-body"><div class="task-title${t.done?' done':''}">${t.title}</div>
      <div class="task-meta"><span class="pri-badge ${pc}">${pl}</span><span class="cat-dot" style="background:${c.dot};width:6px;height:6px;display:inline-block;border-radius:50%"></span><span style="font-size:11px;color:var(--text3)">${c.label}</span></div>
    </div>
    <button class="task-del" onclick="delTask(event,${t.id})"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg></button>
  </div>`;
}
function toggleTask(id){const t=tasks.find(t=>t.id===id);if(t){t.done=!t.done;saveAll();renderTasks();buildStats();}}
function delTask(e,id){e.stopPropagation();if(confirm('Delete task?')){tasks=tasks.filter(t=>t.id!==id);saveAll();renderTasks();buildStats();}}

function renderHabits(){
  const today=new Date();
  document.getElementById('habits-date').textContent='Last 7 days · '+today.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const week=Array.from({length:7},(_,i)=>{const d=new Date(today);d.setDate(today.getDate()-6+i);return d;});
  const dn=['M','T','W','T','F','S','S'];
  const grid=document.getElementById('habits-view');
  if(!habits.length){grid.innerHTML='<div style="color:var(--text3);padding:40px 0;text-align:center;font-size:13px">No habits yet — add one above</div>';return;}
  grid.innerHTML='';
  habits.forEach(h=>{
    const c=catById(h.cat);
    let streak=0;for(let i=0;i<365;i++){const d=new Date(today);d.setDate(today.getDate()-i);if((h.done||{})[ds(d)])streak++;else break;}
    const card=document.createElement('div');card.className='habit-card';
    let dHTML='<div class="habit-week">';
    week.forEach(d=>{const key=ds(d);const done=!!(h.done||{})[key];dHTML+=`<div class="hday${done?' done':''}" style="${done?'background:'+c.dot+';color:#1a1208':''}" onclick="toggleHabit(${h.id},'${key}')">${d.getDate()}</div>`;});
    dHTML+='</div><div class="habit-labels">';
    week.forEach(d=>{const i=d.getDay()===0?6:d.getDay()-1;dHTML+=`<span>${dn[i]}</span>`;});
    dHTML+='</div>';
    card.innerHTML=`<div class="habit-top"><div class="habit-name">${h.name}</div><div class="habit-streak" style="color:${c.dot}">🔥 ${streak}</div></div>${dHTML}<div class="habit-footer"><button class="habit-del" onclick="delHabit(${h.id})">Remove</button></div>`;
    grid.appendChild(card);
  });
}
function toggleHabit(id,key){const h=habits.find(h=>h.id===id);if(h){h.done[key]=!h.done[key];saveAll();renderHabits();}}
function delHabit(id){if(confirm('Remove habit?')){habits=habits.filter(h=>h.id!==id);saveAll();renderHabits();}}

function renderNotes(){
  const grid=document.getElementById('notes-view');
  if(!notes.length){grid.innerHTML='<div style="color:var(--text3);padding:40px 0;text-align:center;font-size:13px">No notes yet</div>';return;}
  grid.innerHTML='';
  notes.forEach(n=>{
    const card=document.createElement('div');card.className='note-card';
    const ta=document.createElement('textarea');ta.className='note-ta';ta.value=n.text;ta.placeholder='Type a note...';ta.oninput=()=>{n.text=ta.value;saveAll();};
    const footer=document.createElement('div');footer.className='note-footer';
    const date=document.createElement('span');date.className='note-date';date.textContent=new Date(n.created).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
    const del=document.createElement('button');del.className='note-del';del.textContent='Delete';del.onclick=()=>{notes=notes.filter(x=>x.id!==n.id);saveAll();renderNotes();};
    footer.appendChild(date);footer.appendChild(del);card.appendChild(ta);card.appendChild(footer);grid.appendChild(card);
  });
}
function addNote(){notes.unshift({id:nid++,text:'',created:new Date().toISOString()});saveAll();renderNotes();setTimeout(()=>document.querySelector('.note-ta')?.focus(),50);}

function buildCatGrid(id,sel,onPick){
  const g=document.getElementById(id);g.innerHTML='';
  CATS.forEach(c=>{
    const d=document.createElement('div');d.className='cat-opt';
    const s=sel===c.id;
    d.style.background=s?c.bg:'var(--bg3)';d.style.color=s?c.text:'var(--text2)';d.style.borderColor=s?c.dot:'transparent';
    d.textContent=c.label;d.onclick=()=>onPick(c.id);
    g.appendChild(d);
  });
}

function openModal(type){
  closeModals();
  if(type==='event'){document.getElementById('e-date').value=ds(curDate);buildCatGrid('e-cats',selEvtCat,id=>{selEvtCat=id;buildCatGrid('e-cats',selEvtCat,arguments.callee||function(){});});document.getElementById('m-event').className='modal-back open';}
  if(type==='task'){buildCatGrid('t-cats',selTaskCat,id=>{selTaskCat=id;buildCatGrid('t-cats',selTaskCat,()=>{});});document.getElementById('m-task').className='modal-back open';}
  if(type==='habit'){buildCatGrid('h-cats',selHabitCat,id=>{selHabitCat=id;buildCatGrid('h-cats',selHabitCat,()=>{});});document.getElementById('m-habit').className='modal-back open';}
}
function closeModals(){document.querySelectorAll('.modal-back').forEach(m=>m.className='modal-back');}
function bgClose(e,id){if(e.target===document.getElementById(id))closeModals();}
function pickPri(el){curPri=el.dataset.p;document.querySelectorAll('.pri-opt').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');}

function saveEvent(){
  const n=document.getElementById('e-name').value.trim();if(!n)return;
  events.push({id:nid++,title:n,cat:selEvtCat,date:document.getElementById('e-date').value,start:document.getElementById('e-start').value,end:document.getElementById('e-end').value});
  document.getElementById('e-name').value='';saveAll();closeModals();renderSched();
}
function saveTask(){
  const n=document.getElementById('t-name').value.trim();if(!n)return;
  tasks.push({id:nid++,title:n,cat:selTaskCat,pri:curPri,done:false});
  document.getElementById('t-name').value='';saveAll();closeModals();renderTasks();buildStats();
}
function saveHabit(){
  const n=document.getElementById('h-name').value.trim();if(!n)return;
  habits.push({id:nid++,name:n,cat:selHabitCat,done:{}});
  document.getElementById('h-name').value='';saveAll();closeModals();renderHabits();
}
