<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0f0f0f;
  --bg2:#161616;
  --bg3:#1e1e1e;
  --bg4:#252525;
  --border:#2a2a2a;
  --border2:#333;
  --text:#f0f0f0;
  --text2:#888;
  --text3:#555;
  --accent:#c8a87a;
  --accent2:#a0845a;
  --r:12px;
  --r-sm:8px;

  --work:#4a7cf7;--work-bg:rgba(74,124,247,0.12);--work-text:#93b4fb;
  --social:#3ec47a;--social-bg:rgba(62,196,122,0.12);--social-text:#7ddba5;
  --gf:#f74a8a;--gf-bg:rgba(247,74,138,0.12);--gf-text:#fb93b8;
  --personal:#a855f7;--personal-bg:rgba(168,85,247,0.12);--personal-text:#c493fb;
  --health:#f7974a;--health-bg:rgba(247,151,74,0.12);--health-text:#fbb876;
}

body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

/* Layout */
.shell{display:flex;min-height:100vh}
.side{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 12px;gap:6px;position:sticky;top:0;height:100vh;overflow-y:auto}
.content{flex:1;min-width:0;padding:28px 32px;overflow-y:auto}

/* Sidebar */
.side-logo{display:flex;align-items:center;gap:10px;padding:8px 10px;margin-bottom:16px}
.side-logo-icon{width:28px;height:28px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.side-logo-icon svg{width:14px;height:14px;fill:var(--bg)}
.side-logo-name{font-size:14px;font-weight:600;color:var(--text)}
.side-section-label{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;padding:16px 10px 6px}
.side-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r-sm);border:none;background:transparent;color:var(--text2);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;width:100%;text-align:left;transition:all 0.15s}
.side-btn:hover{background:var(--bg3);color:var(--text)}
.side-btn.active{background:var(--bg4);color:var(--accent)}
.side-btn svg{width:15px;height:15px;flex-shrink:0;opacity:0.7}
.side-btn.active svg{opacity:1}
.cat-item{display:flex;align-items:center;gap:9px;padding:7px 12px;border-radius:var(--r-sm);cursor:pointer;transition:all 0.12s}
.cat-item:hover{background:var(--bg3)}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cat-item-label{font-size:12px;color:var(--text2);transition:all 0.12s}
.cat-item.off .cat-dot{opacity:0.2}
.cat-item.off .cat-item-label{color:var(--text3);text-decoration:line-through}

/* Page sections */
.page{display:none}.page.active{display:block}

/* Header */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.ph-left h1{font-size:22px;font-weight:600;letter-spacing:-0.03em;color:var(--text)}
.ph-left p{font-size:12px;color:var(--text3);margin-top:3px;font-family:'JetBrains Mono',monospace}
.ph-right{display:flex;align-items:center;gap:8px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r-sm);font-size:13px;font-family:'Inter',sans-serif;font-weight:500;cursor:pointer;border:none;transition:all 0.15s}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn svg{width:13px;height:13px}

/* Toggle */
.toggle{display:flex;background:var(--bg3);border-radius:var(--r-sm);padding:3px;gap:2px;border:1px solid var(--border)}
.tgl{padding:5px 14px;font-size:12px;border:none;background:transparent;color:var(--text3);border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;font-weight:400}
.tgl.active{background:var(--bg4);color:var(--text);font-weight:500}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.stat-label{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:0.06em;margin-bottom:6px}
.stat-val{font-size:22px;font-weight:600;letter-spacing:-0.03em}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* Nav row */
.nav-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.nav-arr{width:28px;height:28px;border-radius:var(--r-sm);background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.15s;flex-shrink:0}
.nav-arr:hover{background:var(--bg3)}
.nav-arr svg{width:12px;height:12px}
.nav-per{font-size:13px;font-weight:500;min-width:150px;text-align:center;color:var(--text)}
.today-btn{padding:4px 11px;font-size:11px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;color:var(--text3);font-family:'Inter',sans-serif;transition:all 0.15s}
.today-btn:hover{background:var(--bg3);color:var(--text)}

/* Day grid */
.day-grid{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.hr-row{display:flex;min-height:50px;border-bottom:1px solid var(--border)}
.hr-row:last-child{border-bottom:none}
.hr-lbl{width:48px;padding:10px 10px 0 0;font-size:10px;color:var(--text3);text-align:right;font-family:'JetBrains Mono',monospace;flex-shrink:0}
.hr-body{flex:1;padding:4px 8px;display:flex;flex-direction:column;gap:3px}
.ev-chip{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:none;text-align:left;width:100%;transition:opacity 0.15s;font-family:'Inter',sans-serif;position:relative}
.ev-chip:hover{opacity:0.8}
.ev-chip:hover .ev-del{opacity:1}
.ev-title{flex:1}
.ev-time{font-size:10px;opacity:0.55;font-family:'JetBrains Mono',monospace;font-weight:400}
.ev-del{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.15s;z-index:1}
.ev-del svg{width:8px;height:8px;stroke:#fff;stroke-width:2}

/* Week grid */
.week-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.week-grid{display:grid;grid-template-columns:44px repeat(7,1fr)}
.wg-corner{border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.wg-dh{font-size:10px;font-weight:500;color:var(--text3);text-align:center;padding:8px 4px;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.wg-dh:last-child{border-right:none}
.wg-dh.today{color:var(--accent);font-weight:700}
.wg-dh span{font-size:14px;font-weight:600;display:block;margin-top:1px;letter-spacing:-0.02em}
.wg-hl{font-size:10px;color:var(--text3);text-align:right;padding:3px 6px 0 0;height:42px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);font-family:'JetBrains Mono',monospace}
.wg-cell{height:42px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);position:relative;overflow:hidden}
.wg-cell:last-child{border-right:none}
.wg-cell.today{background:rgba(200,168,122,0.04)}
.wg-ev{position:absolute;left:2px;right:2px;top:3px;border-radius:5px;padding:2px 5px;font-size:10px;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer}
.wg-ev:hover{opacity:0.75}

/* Tasks */
.tasks-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.task-col{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.tc-hdr{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.tc-title{font-size:13px;font-weight:600}
.tc-count{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.task-list{padding:6px;min-height:60px}
.task-item{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;border-radius:var(--r-sm);transition:background 0.12s;cursor:pointer}
.task-item:hover{background:var(--bg3)}
.tcheck{width:16px;height:16px;border-radius:5px;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.tcheck.done{background:var(--accent);border-color:var(--accent)}
.tcheck.done::after{content:'';display:block;width:8px;height:4px;border-left:1.5px solid var(--bg);border-bottom:1.5px solid var(--bg);transform:rotate(-45deg) translate(1px,-1px)}
.task-body{flex:1;min-width:0}
.task-title{font-size:13px;line-height:1.4}
.task-title.done{text-decoration:line-through;color:var(--text3)}
.task-meta{display:flex;align-items:center;gap:6px;margin-top:3px}
.pri-badge{font-size:10px;font-weight:500;padding:1px 7px;border-radius:20px}
.pri-high{background:rgba(247,74,74,0.15);color:#f97c7c}
.pri-med{background:rgba(247,151,74,0.15);color:#fbb876}
.pri-low{background:var(--bg4);color:var(--text3)}
.task-del{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text3);padding:2px;opacity:0;transition:opacity 0.15s;flex-shrink:0}
.task-item:hover .task-del{opacity:1}
.task-del:hover{color:#f97c7c}
.task-del svg{width:12px;height:12px}

/* Habits */
.habits-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.habit-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.habit-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.habit-name{font-size:13px;font-weight:500}
.habit-streak{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text3)}
.habit-week{display:flex;gap:4px}
.hday{flex:1;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'JetBrains Mono',monospace;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text3);transition:all 0.15s}
.hday.done{border-color:transparent;color:var(--bg)}
.habit-labels{display:flex;gap:4px;margin-top:4px}
.habit-labels span{flex:1;text-align:center;font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.habit-footer{display:flex;justify-content:flex-end;margin-top:10px}
.habit-del{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:color 0.15s}
.habit-del:hover{color:#f97c7c}

/* Notes */
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.note-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;min-height:130px}
.note-ta{width:100%;border:none;background:transparent;resize:none;font-size:13px;font-family:'Inter',sans-serif;color:var(--text);outline:none;flex:1;line-height:1.6}
.note-ta::placeholder{color:var(--text3)}
.note-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.note-date{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.note-del{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:color 0.15s}
.note-del:hover{color:#f97c7c}

/* Finance */
.finance-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.finance-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.fc-title{font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:0.06em;margin-bottom:16px}
.finance-empty{text-align:center;padding:40px 20px;color:var(--text3)}
.finance-empty-icon{font-size:32px;margin-bottom:10px}
.finance-empty-text{font-size:13px;line-height:1.6}
.donut-wrap{display:flex;align-items:center;gap:20px}
.donut-legend{flex:1;display:flex;flex-direction:column;gap:8px}
.legend-item{display:flex;align-items:center;gap:8px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-label{font-size:12px;color:var(--text2);flex:1}
.legend-val{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text)}
.bar-chart{display:flex;flex-direction:column;gap:10px}
.bar-item{}
.bar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.bar-label{font-size:12px;color:var(--text2)}
.bar-amount{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text)}
.bar-track{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 0.6s ease}
.insight-list{display:flex;flex-direction:column;gap:10px}
.insight-item{display:flex;align-items:flex-start;gap:10px;padding:12px;background:var(--bg3);border-radius:var(--r-sm)}
.insight-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.insight-text{font-size:12px;color:var(--text2);line-height:1.5}
.insight-text strong{color:var(--text);font-weight:500}
.finance-full{grid-column:1/-1}
.total-spend{font-size:32px;font-weight:600;letter-spacing:-0.03em;color:var(--text);margin-bottom:4px}
.total-label{font-size:12px;color:var(--text3)}

/* Modal */
.modal-back{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal-back.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:24px;width:370px;max-width:calc(100vw - 32px);animation:su 0.18s ease}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.modal h2{font-size:16px;font-weight:600;letter-spacing:-0.02em;margin-bottom:18px}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:0.06em;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:8px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);font-size:13px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:border-color 0.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{min-height:80px;resize:vertical;line-height:1.5}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:4px}
.cat-opt{padding:7px;border-radius:var(--r-sm);font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid transparent;text-align:center;transition:all 0.15s;font-family:'Inter',sans-serif;background:var(--bg3);color:var(--text2)}
.pri-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:4px}
.pri-opt{padding:7px;border-radius:var(--r-sm);font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid transparent;text-align:center;transition:all 0.15s;font-family:'Inter',sans-serif;background:var(--bg3);color:var(--text2)}
.pri-opt.sel{border-color:var(--accent);color:var(--accent);background:rgba(200,168,122,0.1)}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}

@media(max-width:700px){.side{display:none}.content{padding:20px 16px}.stats{grid-template-columns:1fr 1fr}.tasks-cols{grid-template-columns:1fr}.finance-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">

<aside class="side">
  <div class="side-logo">
    <div class="side-logo-icon"><svg viewBox="0 0 14 14"><rect x="1" y="1" width="5" height="5" rx="1.5"/><rect x="8" y="1" width="5" height="5" rx="1.5"/><rect x="1" y="8" width="5" height="5" rx="1.5"/><rect x="8" y="8" width="5" height="5" rx="1.5"/></svg></div>
    <span class="side-logo-name">Life Planner</span>
  </div>

  <div class="side-section-label">Menu</div>
  <button class="side-btn active" data-page="schedule" onclick="nav(this,'schedule')">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><line x1="5" y1="1" x2="5" y2="4"/><line x1="11" y1="1" x2="11" y2="4"/><line x1="2" y1="7" x2="14" y2="7"/></svg>
    Schedule
  </button>
  <button class="side-btn" data-page="tasks" onclick="nav(this,'tasks')">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><polyline points="5,8 7,10 11,6"/></svg>
    Tasks
  </button>
  <button class="side-btn" data-page="habits" onclick="nav(this,'habits')">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><polyline points="5,8 7,10 11,6"/></svg>
    Habits
  </button>
  <button class="side-btn" data-page="notes" onclick="nav(this,'notes')">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><line x1="5" y1="6" x2="11" y2="6"/><line x1="5" y1="9.5" x2="9" y2="9.5"/></svg>
    Notes
  </button>
  <button class="side-btn" data-page="finance" onclick="nav(this,'finance')">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="2" y1="12" x2="2" y2="6"/><line x1="6" y1="12" x2="6" y2="4"/><line x1="10" y1="12" x2="10" y2="7"/><line x1="14" y1="12" x2="14" y2="2"/><line x1="1" y1="12" x2="15" y2="12"/></svg>
    Finance
  </button>

  <div class="side-section-label" style="margin-top:8px">Categories</div>
  <div id="cat-filters"></div>
</aside>

<main class="content">

  <!-- Schedule -->
  <section class="page active" id="pg-schedule">
    <div class="ph">
      <div class="ph-left"><h1 id="sched-title">Today</h1><p id="sched-date"></p></div>
      <div class="ph-right">
        <div class="toggle"><button class="tgl active" id="tgl-day" onclick="setView('day')">Day</button><button class="tgl" id="tgl-week" onclick="setView('week')">Week</button></div>
        <button class="btn btn-primary" onclick="openModal('event')"><svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2"><line x1="6.5" y1="1" x2="6.5" y2="12"/><line x1="1" y1="6.5" x2="12" y2="6.5"/></svg>Add event</button>
      </div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="nav-row">
      <button class="nav-arr" onclick="nudge(-1)"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="8,1 3,6 8,11"/></svg></button>
      <span class="nav-per" id="nav-per"></span>
      <button class="nav-arr" onclick="nudge(1)"><svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="4,1 9,6 4,11"/></svg></button>
      <button class="today-btn" onclick="jumpToday()">Today</button>
    </div>
    <div id="sched-view"></div>
  </section>

  <!-- Tasks -->
  <section class="page" id="pg-tasks">
    <div class="ph">
      <div class="ph-left"><h1>Tasks</h1><p>Click to complete · hover to delete</p></div>
      <div class="ph-right"><button class="btn btn-primary" onclick="openModal('task')"><svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2"><line x1="6.5" y1="1" x2="6.5" y2="12"/><line x1="1" y1="6.5" x2="12" y2="6.5"/></svg>Add task</button></div>
    </div>
    <div class="tasks-cols" id="tasks-view"></div>
  </section>

  <!-- Habits -->
  <section class="page" id="pg-habits">
    <div class="ph">
      <div class="ph-left"><h1>Habits</h1><p id="habits-date"></p></div>
      <div class="ph-right"><button class="btn btn-primary" onclick="openModal('habit')"><svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2"><line x1="6.5" y1="1" x2="6.5" y2="12"/><line x1="1" y1="6.5" x2="12" y2="6.5"/></svg>New habit</button></div>
    </div>
    <div class="habits-grid" id="habits-view"></div>
  </section>

  <!-- Notes -->
  <section class="page" id="pg-notes">
    <div class="ph">
      <div class="ph-left"><h1>Notes</h1><p>Thoughts, ideas, anything</p></div>
      <div class="ph-right"><button class="btn btn-primary" onclick="addNote()"><svg viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2"><line x1="6.5" y1="1" x2="6.5" y2="12"/><line x1="1" y1="6.5" x2="12" y2="6.5"/></svg>New note</button></div>
    </div>
    <div class="notes-grid" id="notes-view"></div>
  </section>

  <!-- Finance -->
  <section class="page" id="pg-finance">
    <div class="ph">
      <div class="ph-left"><h1>Finance</h1><p id="finance-period">Paste your statement to Claude to populate</p></div>
    </div>
    <div id="finance-view"></div>
  </section>

</main>
</div>

<!-- Event Modal -->
<div class="modal-back" id="m-event">
  <div class="modal">
    <h2>Add event</h2>
    <div class="field"><label>NAME</label><input type="text" id="e-name" placeholder="e.g. Gym session"></div>
    <div class="field"><label>DATE</label><input type="date" id="e-date"></div>
    <div class="two-col">
      <div class="field"><label>START</label><input type="time" id="e-start"></div>
      <div class="field"><label>END</label><input type="time" id="e-end"></div>
    </div>
    <div class="field"><label>CATEGORY</label><div class="cat-grid" id="e-cats"></div></div>
    <div class="mfoot"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-primary" onclick="saveEvent()">Save</button></div>
  </div>
</div>

<!-- Task Modal -->
<div class="modal-back" id="m-task">
  <div class="modal">
    <h2>Add task</h2>
    <div class="field"><label>TASK</label><input type="text" id="t-name" placeholder="e.g. Edit shoot footage"></div>
    <div class="field"><label>PRIORITY</label>
      <div class="pri-grid">
        <div class="pri-opt sel" data-p="high" onclick="selPri(this)">High</div>
        <div class="pri-opt" data-p="med" onclick="selPri(this)">Medium</div>
        <div class="pri-opt" data-p="low" onclick="selPri(this)">Low</div>
      </div>
    </div>
    <div class="field"><label>CATEGORY</label><div class="cat-grid" id="t-cats"></div></div>
    <div class="mfoot"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-primary" onclick="saveTask()">Save</button></div>
  </div>
</div>

<!-- Habit Modal -->
<div class="modal-back" id="m-habit">
  <div class="modal">
    <h2>New habit</h2>
    <div class="field"><label>HABIT NAME</label><input type="text" id="h-name" placeholder="e.g. Morning run"></div>
    <div class="field"><label>CATEGORY</label><div class="cat-grid" id="h-cats"></div></div>
    <div class="mfoot"><button class="btn btn-ghost" onclick="closeModals()">Cancel</button><button class="btn btn-primary" onclick="saveHabit()">Save</button></div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const CATS=[
  {id:'work',    label:'Work',    dot:'var(--work)',    bg:'var(--work-bg)',    text:'var(--work-text)'},
  {id:'social',  label:'Social',  dot:'var(--social)',  bg:'var(--social-bg)',  text:'var(--social-text)'},
  {id:'gf',      label:'Partner', dot:'var(--gf)',      bg:'var(--gf-bg)',      text:'var(--gf-text)'},
  {id:'personal',label:'Personal',dot:'var(--personal)',bg:'var(--personal-bg)',text:'var(--personal-text)'},
  {id:'health',  label:'Health',  dot:'var(--health)',  bg:'var(--health-bg)',  text:'var(--health-text)'},
];

const LD=(k,d)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d}catch{return d}};
const SV=(k,v)=>localStorage.setItem(k,JSON.stringify(v));

function relDay(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function ds(d){return d.toISOString().slice(0,10);}
function todayDs(){return ds(new Date());}
function catById(id){return CATS.find(c=>c.id===id)||CATS[0];}

let events  = LD('lp3_ev',[
  {id:1,title:'Morning run',cat:'health',date:relDay(0),start:'07:00',end:'07:45'},
  {id:2,title:'Team standup',cat:'work',date:relDay(0),start:'09:30',end:'10:00'},
  {id:3,title:'Deep work',cat:'work',date:relDay(0),start:'10:00',end:'12:30'},
  {id:4,title:'Evening plans',cat:'gf',date:relDay(0),start:'19:00',end:'22:00'},
  {id:5,title:'Gym',cat:'health',date:relDay(1),start:'07:00',end:'08:00'},
  {id:6,title:'Friends catch up',cat:'social',date:relDay(2),start:'18:00',end:'20:00'},
]);
let tasks   = LD('lp3_tk',[
  {id:10,title:'Edit shoot footage',cat:'work',pri:'high',done:false},
  {id:11,title:'Write captions',cat:'work',pri:'med',done:false},
  {id:12,title:'Book restaurant',cat:'gf',pri:'med',done:false},
  {id:13,title:'Reply to brand emails',cat:'work',pri:'high',done:false},
]);
let habits  = LD('lp3_hb',[
  {id:20,name:'Morning run',cat:'health',done:{}},
  {id:21,name:'Read 20 mins',cat:'personal',done:{}},
  {id:22,name:'No phone before 9am',cat:'personal',done:{}},
]);
let notes   = LD('lp3_nt',[{id:30,text:'Ideas for this week:',created:new Date().toISOString()}]);
let finance = LD('lp3_fin',null); // null = no data yet
let nid     = LD('lp3_nid',100);
let filters = new Set(LD('lp3_filt',CATS.map(c=>c.id)));
let view    = 'day';
let curDate = new Date();
let selEvtCat='work', selTaskCat='work', selHabitCat='health', selPri='high';

function saveAll(){SV('lp3_ev',events);SV('lp3_tk',tasks);SV('lp3_hb',habits);SV('lp3_nt',notes);SV('lp3_nid',nid);SV('lp3_filt',[...filters]);if(finance)SV('lp3_fin',finance);}

// ── Navigation ────────────────────────────────────────────────────────────────
function nav(btn,page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-'+page).classList.add('active');
  document.querySelectorAll('.side-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(page==='tasks')   renderTasks();
  if(page==='habits')  renderHabits();
  if(page==='notes')   renderNotes();
  if(page==='finance') renderFinance();
}

// ── Cat filters ───────────────────────────────────────────────────────────────
function buildFilters(){
  const el=document.getElementById('cat-filters');el.innerHTML='';
  CATS.forEach(c=>{
    const on=filters.has(c.id);
    const d=document.createElement('div');
    d.className='cat-item'+(on?'':' off');
    d.innerHTML=`<span class="cat-dot" style="background:${c.dot}"></span><span class="cat-item-label">${c.label}</span>`;
    d.onclick=()=>{if(filters.has(c.id))filters.delete(c.id);else filters.add(c.id);saveAll();buildFilters();renderSched();};
    el.appendChild(d);
  });
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function buildStats(){
  const now=new Date();
  const wd=now.getDay();const mon=new Date(now);mon.setDate(now.getDate()-((wd===0?7:wd)-1));
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const wk=events.filter(e=>{const d=new Date(e.date);return d>=mon&&d<=sun;});
  const tod=events.filter(e=>e.date===todayDs());
  const open=tasks.filter(t=>!t.done).length;
  const today=new Date();
  const streak=habits.length?Math.max(...habits.map(h=>{let s=0;for(let i=0;i<30;i++){const d=new Date(today);d.setDate(today.getDate()-i);if((h.done||{})[ds(d)])s++;else break;}return s;})):0;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">TODAY</div><div class="stat-val">${tod.length}</div><div class="stat-sub">events</div></div>
    <div class="stat"><div class="stat-label">THIS WEEK</div><div class="stat-val">${wk.length}</div><div class="stat-sub">scheduled</div></div>
    <div class="stat"><div class="stat-label">OPEN TASKS</div><div class="stat-val">${open}</div><div class="stat-sub">to do</div></div>
    <div class="stat"><div class="stat-label">HABIT STREAK</div><div class="stat-val">${streak}</div><div class="stat-sub">days</div></div>
  `;
}

// ── Schedule ──────────────────────────────────────────────────────────────────
function renderSched(){
  buildStats();
  const isTod=ds(curDate)===todayDs();
  document.getElementById('sched-title').textContent=view==='week'?'This week':(isTod?'Today':fmtS(curDate));
  document.getElementById('sched-date').textContent=view==='week'?wkRange():fmtL(curDate);
  document.getElementById('nav-per').textContent=view==='week'?wkRange():fmtS(curDate);
  view==='day'?renderDay():renderWeek();
}

function renderDay(){
  const evts=events.filter(e=>e.date===ds(curDate)&&filters.has(e.cat));
  const hrs=Array.from({length:17},(_,i)=>i+7);
  let h='<div class="day-grid">';
  hrs.forEach(hr=>{
    const he=evts.filter(e=>parseInt((e.start||'0:0').split(':')[0])===hr);
    const lbl=hr===12?'12pm':hr>12?(hr-12)+'pm':hr+'am';
    h+=`<div class="hr-row"><div class="hr-lbl">${lbl}</div><div class="hr-body">`;
    he.forEach(e=>{
      const c=catById(e.cat);
      h+=`<button class="ev-chip" style="background:${c.bg};color:${c.text}" onclick="delEvent(${e.id})">
        <span class="ev-title">${e.title}</span>
        <span class="ev-time">${e.start}–${e.end}</span>
        <span class="ev-del" title="Delete"><svg viewBox="0 0 10 10" fill="none" stroke="currentColor"><line x1="2" y1="2" x2="8" y2="8"/><line x1="8" y1="2" x2="2" y2="8"/></svg></span>
      </button>`;
    });
    h+=`</div></div>`;
  });
  h+='</div>';
  document.getElementById('sched-view').innerHTML=h;
}

function renderWeek(){
  const wd=curDate.getDay();const mon=new Date(curDate);mon.setDate(curDate.getDate()-((wd===0?7:wd)-1));
  const days=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
  const dn=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const hrs=Array.from({length:14},(_,i)=>i+8);
  let h='<div class="week-wrap"><div class="week-grid"><div class="wg-corner"></div>';
  days.forEach((d,i)=>{const t=ds(d)===todayDs();h+=`<div class="wg-dh${t?' today':''}">${dn[i]}<span>${d.getDate()}</span></div>`;});
  hrs.forEach(hr=>{
    const lbl=hr===12?'12p':hr>12?(hr-12)+'p':hr+'a';
    h+=`<div class="wg-hl">${lbl}</div>`;
    days.forEach(d=>{
      const t=ds(d)===todayDs();
      const evts=events.filter(e=>e.date===ds(d)&&filters.has(e.cat)&&parseInt((e.start||'0:0').split(':')[0])===hr);
      h+=`<div class="wg-cell${t?' today':''}">`;
      evts.forEach(e=>{const c=catById(e.cat);h+=`<div class="wg-ev" style="background:${c.bg};color:${c.text}" onclick="delEvent(${e.id})" title="Click to delete: ${e.title}">${e.title}</div>`;});
      h+=`</div>`;
    });
  });
  h+='</div></div>';
  document.getElementById('sched-view').innerHTML=h;
}

function delEvent(id){
  if(confirm('Delete this event?')){events=events.filter(e=>e.id!==id);saveAll();renderSched();}
}

function wkRange(){
  const wd=curDate.getDay();const mon=new Date(curDate);mon.setDate(curDate.getDate()-((wd===0?7:wd)-1));
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  return `${mon.getDate()} – ${sun.getDate()} ${sun.toLocaleString('en-GB',{month:'long'})} ${sun.getFullYear()}`;
}
function fmtL(d){return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function fmtS(d){return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});}
function setView(v){view=v;document.getElementById('tgl-day').className='tgl'+(v==='day'?' active':'');document.getElementById('tgl-week').className='tgl'+(v==='week'?' active':'');renderSched();}
function nudge(n){if(view==='day')curDate.setDate(curDate.getDate()+n);else curDate.setDate(curDate.getDate()+n*7);renderSched();}
function jumpToday(){curDate=new Date();renderSched();}

// ── Tasks ─────────────────────────────────────────────────────────────────────
function renderTasks(){
  const open=tasks.filter(t=>!t.done).sort((a,b)=>({high:0,med:1,low:2}[a.pri]-{high:0,med:1,low:2}[b.pri]));
  const done=tasks.filter(t=>t.done);
  document.getElementById('tasks-view').innerHTML=`
    <div class="task-col">
      <div class="tc-hdr"><span class="tc-title">To do</span><span class="tc-count">${open.length} left</span></div>
      <div class="task-list">${open.map(tHTML).join('')}</div>
    </div>
    <div class="task-col">
      <div class="tc-hdr"><span class="tc-title">Done</span><span class="tc-count">${done.length} completed</span></div>
      <div class="task-list">${done.map(tHTML).join('')}</div>
    </div>
  `;
}

function tHTML(t){
  const c=catById(t.cat);
  const pc={high:'pri-high',med:'pri-med',low:'pri-low'}[t.pri];
  const pl={high:'High',med:'Medium',low:'Low'}[t.pri];
  return `<div class="task-item" onclick="toggleTask(${t.id})">
    <div class="tcheck${t.done?' done':''}"></div>
    <div class="task-body">
      <div class="task-title${t.done?' done':''}">${t.title}</div>
      <div class="task-meta">
        <span class="pri-badge ${pc}">${pl}</span>
        <span class="cat-dot" style="background:${c.dot};width:6px;height:6px"></span>
        <span style="font-size:11px;color:var(--text3)">${c.label}</span>
      </div>
    </div>
    <button class="task-del" onclick="delTask(event,${t.id})" title="Delete">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>
    </button>
  </div>`;
}

function toggleTask(id){const t=tasks.find(t=>t.id===id);if(t){t.done=!t.done;saveAll();renderTasks();buildStats();}}
function delTask(e,id){e.stopPropagation();if(confirm('Delete task?')){tasks=tasks.filter(t=>t.id!==id);saveAll();renderTasks();buildStats();}}

// ── Habits ────────────────────────────────────────────────────────────────────
function renderHabits(){
  const today=new Date();
  document.getElementById('habits-date').textContent='Last 7 days · '+today.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const week=Array.from({length:7},(_,i)=>{const d=new Date(today);d.setDate(today.getDate()-6+i);return d;});
  const dn=['M','T','W','T','F','S','S'];
  const grid=document.getElementById('habits-view');
  if(!habits.length){grid.innerHTML='<div style="color:var(--text3);padding:40px 0;text-align:center">No habits yet — add one above</div>';return;}
  grid.innerHTML='';
  habits.forEach(h=>{
    const c=catById(h.cat);
    let s=0;for(let i=0;i<365;i++){const d=new Date(today);d.setDate(today.getDate()-i);if((h.done||{})[ds(d)])s++;else break;}
    const card=document.createElement('div');card.className='habit-card';
    let dHTML='<div class="habit-week">';
    week.forEach(d=>{const key=ds(d);const done=!!(h.done||{})[key];dHTML+=`<div class="hday${done?' done':''}" style="${done?'background:'+c.dot:''}" onclick="toggleHabit(${h.id},'${key}')">${d.getDate()}</div>`;});
    dHTML+='</div>';
    let lHTML='<div class="habit-labels">';
    week.forEach(d=>{const i=d.getDay()===0?6:d.getDay()-1;lHTML+=`<span>${dn[i]}</span>`;});
    lHTML+='</div>';
    card.innerHTML=`<div class="habit-top"><div class="habit-name">${h.name}</div><div class="habit-streak" style="color:${c.dot}">🔥 ${s}</div></div>${dHTML}${lHTML}<div class="habit-footer"><button class="habit-del" onclick="delHabit(${h.id})">Remove</button></div>`;
    grid.appendChild(card);
  });
}

function toggleHabit(id,key){const h=habits.find(h=>h.id===id);if(h){h.done[key]=!h.done[key];saveAll();renderHabits();}}
function delHabit(id){if(confirm('Remove habit?')){habits=habits.filter(h=>h.id!==id);saveAll();renderHabits();}}

// ── Notes ─────────────────────────────────────────────────────────────────────
function renderNotes(){
  const grid=document.getElementById('notes-view');
  if(!notes.length){grid.innerHTML='<div style="color:var(--text3);padding:40px 0;text-align:center">No notes yet</div>';return;}
  grid.innerHTML='';
  notes.forEach(n=>{
    const card=document.createElement('div');card.className='note-card';
    const ta=document.createElement('textarea');ta.className='note-ta';ta.value=n.text;ta.placeholder='Type a note...';ta.oninput=()=>{n.text=ta.value;saveAll();};
    const footer=document.createElement('div');footer.className='note-footer';
    const date=document.createElement('span');date.className='note-date';date.textContent=new Date(n.created).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
    const del=document.createElement('button');del.className='note-del';del.textContent='Delete';del.onclick=()=>{notes=notes.filter(x=>x.id!==n.id);saveAll();renderNotes();};
    footer.appendChild(date);footer.appendChild(del);
    card.appendChild(ta);card.appendChild(footer);
    grid.appendChild(card);
  });
}
function addNote(){notes.unshift({id:nid++,text:'',created:new Date().toISOString()});saveAll();renderNotes();setTimeout(()=>document.querySelector('.note-ta')?.focus(),50);}

// ── Finance ───────────────────────────────────────────────────────────────────
function renderFinance(){
  const el=document.getElementById('finance-view');
  if(!finance||!finance.categories||!finance.categories.length){
    el.innerHTML=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:48px;text-align:center;max-width:500px;margin:0 auto">
      <div style="font-size:36px;margin-bottom:16px">💳</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:10px;color:var(--text)">No finance data yet</div>
      <div style="font-size:13px;color:var(--text3);line-height:1.7">Paste your bank statement into the Claude chat and ask me to update your finance section. I'll analyse your spending and build your charts automatically.</div>
    </div>`;
    return;
  }

  const cats=finance.categories;
  const total=cats.reduce((s,c)=>s+c.amount,0);
  const max=Math.max(...cats.map(c=>c.amount));
  const COLORS=['#4a7cf7','#3ec47a','#f74a8a','#a855f7','#f7974a','#f7d44a','#4af7e8','#f74a4a'];

  // Donut
  let donutSVG=`<svg viewBox="0 0 120 120" width="130" height="130" style="flex-shrink:0">`;
  let angle=0;
  cats.forEach((c,i)=>{
    const pct=c.amount/total;const sweep=pct*360;
    const r=45;const cx=60;const cy=60;
    const startRad=(angle-90)*Math.PI/180;const endRad=(angle+sweep-90)*Math.PI/180;
    const x1=cx+r*Math.cos(startRad);const y1=cy+r*Math.sin(startRad);
    const x2=cx+r*Math.cos(endRad);const y2=cy+r*Math.sin(endRad);
    const large=sweep>180?1:0;
    donutSVG+=`<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z" fill="${COLORS[i%COLORS.length]}" opacity="0.9"/>`;
    angle+=sweep;
  });
  donutSVG+=`<circle cx="60" cy="60" r="28" fill="var(--bg2)"/><text x="60" y="57" text-anchor="middle" fill="var(--text)" font-size="10" font-family="JetBrains Mono,monospace" font-weight="500">Total</text><text x="60" y="70" text-anchor="middle" fill="var(--text)" font-size="9" font-family="JetBrains Mono,monospace">£${total.toFixed(0)}</text></svg>`;

  let legendHTML=cats.map((c,i)=>`<div class="legend-item"><span class="legend-dot" style="background:${COLORS[i%COLORS.length]}"></span><span class="legend-label">${c.name}</span><span class="legend-val">£${c.amount.toFixed(0)}</span></div>`).join('');

  let barsHTML=cats.map((c,i)=>`<div class="bar-item"><div class="bar-top"><span class="bar-label">${c.name}</span><span class="bar-amount">£${c.amount.toFixed(0)} <span style="color:var(--text3);font-size:10px">${(c.amount/total*100).toFixed(0)}%</span></span></div><div class="bar-track"><div class="bar-fill" style="width:${(c.amount/max*100).toFixed(0)}%;background:${COLORS[i%COLORS.length]}"></div></div></div>`).join('');

  let insightsHTML=(finance.insights||[]).map(ins=>`<div class="insight-item"><span class="insight-icon">${ins.icon||'💡'}</span><div class="insight-text">${ins.text}</div></div>`).join('');

  document.getElementById('finance-period').textContent=finance.period||'Last month';

  el.innerHTML=`
    <div class="finance-grid">
      <div class="finance-card">
        <div class="fc-title">SPENDING BREAKDOWN</div>
        <div class="donut-wrap">${donutSVG}<div class="donut-legend">${legendHTML}</div></div>
      </div>
      <div class="finance-card">
        <div class="fc-title">BY CATEGORY</div>
        <div class="bar-chart">${barsHTML}</div>
      </div>
      ${insightsHTML?`<div class="finance-card finance-full"><div class="fc-title">INSIGHTS & RECOMMENDATIONS</div><div class="insight-list">${insightsHTML}</div></div>`:''}
    </div>
  `;
}

// ── Modals ────────────────────────────────────────────────────────────────────
function buildCatGrid(id,sel,onPick){
  const g=document.getElementById(id);g.innerHTML='';
  CATS.forEach(c=>{
    const d=document.createElement('div');d.className='cat-opt';
    const s=sel===c.id;
    d.style.background=s?c.bg:'var(--bg3)';d.style.color=s?c.text:'var(--text2)';d.style.borderColor=s?c.dot:'transparent';
    d.textContent=c.label;d.onclick=()=>onPick(c.id);
    g.appendChild(d);
  });
}

function openModal(type){
  closeModals();
  if(type==='event'){
    document.getElementById('e-date').value=ds(curDate);
    buildCatGrid('e-cats',selEvtCat,id=>{selEvtCat=id;openModal('event');});
    document.getElementById('m-event').className='modal-back open';
  }
  if(type==='task'){
    buildCatGrid('t-cats',selTaskCat,id=>{selTaskCat=id;openModal('task');});
    document.getElementById('m-task').className='modal-back open';
  }
  if(type==='habit'){
    buildCatGrid('h-cats',selHabitCat,id=>{selHabitCat=id;openModal('habit');});
    document.getElementById('m-habit').className='modal-back open';
  }
}
function closeModals(){document.querySelectorAll('.modal-back').forEach(m=>m.className='modal-back');}

function selPri(el){selPri=el.dataset.p;document.querySelectorAll('.pri-opt').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');}

function saveEvent(){
  const n=document.getElementById('e-name').value.trim();if(!n)return;
  events.push({id:nid++,title:n,cat:selEvtCat,date:document.getElementById('e-date').value,start:document.getElementById('e-start').value,end:document.getElementById('e-end').value});
  document.getElementById('e-name').value='';saveAll();closeModals();renderSched();
}
function saveTask(){
  const n=document.getElementById('t-name').value.trim();if(!n)return;
  tasks.push({id:nid++,title:n,cat:selTaskCat,pri:selPri,done:false});
  document.getElementById('t-name').value='';saveAll();closeModals();renderTasks();buildStats();
}
function saveHabit(){
  const n=document.getElementById('h-name').value.trim();if(!n)return;
  habits.push({id:nid++,name:n,cat:selHabitCat,done:{}});
  document.getElementById('h-name').value='';saveAll();closeModals();renderHabits();
}

document.querySelectorAll('.modal-back').forEach(m=>m.addEventListener('click',e=>{if(e.target===e.currentTarget)closeModals();}));

// ── Init ──────────────────────────────────────────────────────────────────────
buildFilters();
renderSched();
</script>
</body>
</html>
