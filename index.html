<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Life Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text: #1a1814;
    --text2: #6b6560;
    --text3: #a09b95;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);

    --work-bg: #e8f0fd; --work-text: #1a3a8f; --work-dot: #3b6fe8;
    --social-bg: #e6f7ee; --social-text: #0f5132; --social-dot: #22a055;
    --gf-bg: #fde8f0; --gf-text: #8f1a4a; --gf-dot: #e83b7a;
    --personal-bg: #ede8fd; --personal-text: #3d1a8f; --personal-dot: #7b3be8;
    --health-bg: #fdf3e8; --health-text: #7a3a0a; --health-dot: #e87b3b;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141210;
      --surface: #1e1c18;
      --surface2: #252218;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #f0ede6;
      --text2: #9a9590;
      --text3: #5a5550;

      --work-bg: #1a2540; --work-text: #90aef5; --work-dot: #5b8af0;
      --social-bg: #132a1e; --social-text: #70d496; --social-dot: #30b865;
      --gf-bg: #2a1220; --gf-text: #f590b8; --gf-dot: #f06095;
      --personal-bg: #1e1430; --personal-text: #b090f5; --personal-dot: #9060f0;
      --health-bg: #2a1e10; --health-text: #f5b870; --health-dot: #e89050;
    }
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
  }

  /* Layout */
  .layout { display: flex; min-height: 100vh; }
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 32px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .main { flex: 1; padding: 32px 36px; min-width: 0; }

  /* Logo */
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark {
    width: 34px; height: 34px; border-radius: 10px;
    background: var(--text); display: flex; align-items: center; justify-content: center;
  }
  .logo-mark svg { width: 18px; height: 18px; fill: var(--bg); }
  .logo-text { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }

  /* Nav */
  .nav-section { display: flex; flex-direction: column; gap: 4px; }
  .nav-label { font-size: 11px; font-weight: 500; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; padding-left: 8px; }
  .nav-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: var(--radius-sm);
    border: none; background: transparent; color: var(--text2);
    font-size: 14px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; width: 100%; text-align: left; transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active { background: var(--text); color: var(--bg); }
  .nav-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* Category filters */
  .cat-filter {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; border-radius: var(--radius-sm);
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .cat-filter:hover { background: var(--surface2); }
  .cat-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .cat-filter-label { font-size: 13px; color: var(--text2); flex: 1; }
  .cat-filter.off .cat-dot { opacity: 0.25; }
  .cat-filter.off .cat-filter-label { color: var(--text3); text-decoration: line-through; }

  /* Header */
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; }
  .page-title { font-size: 26px; font-weight: 600; letter-spacing: -0.03em; }
  .page-date { font-size: 13px; color: var(--text3); margin-top: 3px; font-family: 'DM Mono', monospace; }
  .header-actions { display: flex; align-items: center; gap: 8px; }

  /* View toggle */
  .view-toggle {
    display: flex; background: var(--surface2);
    border-radius: var(--radius-sm); padding: 3px; gap: 2px;
    border: 1px solid var(--border);
  }
  .vt-btn {
    padding: 5px 14px; font-size: 13px; border: none;
    background: transparent; color: var(--text2);
    border-radius: 6px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s; font-weight: 400;
  }
  .vt-btn.active { background: var(--surface); color: var(--text); font-weight: 500; box-shadow: var(--shadow); }

  /* Add button */
  .add-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px; background: var(--text); color: var(--bg);
    border: none; border-radius: var(--radius-sm); font-size: 13px;
    font-family: 'DM Sans', sans-serif; font-weight: 500;
    cursor: pointer; transition: opacity 0.15s;
  }
  .add-btn:hover { opacity: 0.85; }
  .add-btn svg { width: 14px; height: 14px; }

  /* Stats */
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px;
  }
  .stat-label { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; letter-spacing: 0.04em; margin-bottom: 6px; }
  .stat-val { font-size: 28px; font-weight: 600; letter-spacing: -0.03em; }
  .stat-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* Nav row */
  .nav-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .nav-arrow {
    width: 30px; height: 30px; border-radius: var(--radius-sm);
    background: var(--surface); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s; flex-shrink: 0;
  }
  .nav-arrow:hover { background: var(--surface2); }
  .nav-arrow svg { width: 14px; height: 14px; }
  .nav-period { font-size: 14px; font-weight: 500; min-width: 130px; text-align: center; }
  .today-btn {
    padding: 5px 12px; font-size: 12px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    cursor: pointer; color: var(--text2); font-family: 'DM Sans', sans-serif;
    transition: background 0.15s;
  }
  .today-btn:hover { background: var(--surface2); }

  /* Day view */
  .day-grid {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .hour-row { display: flex; align-items: stretch; min-height: 54px; border-bottom: 1px solid var(--border); }
  .hour-row:last-child { border-bottom: none; }
  .hour-row.current-hour { background: rgba(255,210,0,0.04); }
  .hour-lbl {
    width: 52px; padding: 10px 10px 0 0;
    font-size: 11px; color: var(--text3); text-align: right;
    font-family: 'DM Mono', monospace; flex-shrink: 0;
  }
  .hour-body { flex: 1; padding: 4px 8px; display: flex; flex-direction: column; gap: 3px; }
  .event-chip {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 10px; border-radius: 8px;
    font-size: 12px; font-weight: 500; cursor: pointer;
    border: none; text-align: left; width: 100%;
    transition: opacity 0.15s; font-family: 'DM Sans', sans-serif;
  }
  .event-chip:hover { opacity: 0.75; }
  .event-chip-title { flex: 1; }
  .event-chip-time { font-size: 10px; opacity: 0.65; font-family: 'DM Mono', monospace; font-weight: 400; }

  /* Week view */
  .week-grid-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .week-grid { display: grid; grid-template-columns: 44px repeat(7, 1fr); }
  .wg-corner { border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
  .wg-dayhdr {
    font-size: 11px; font-weight: 500; color: var(--text3);
    text-align: center; padding: 8px 4px;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
  .wg-dayhdr:last-child { border-right: none; }
  .wg-dayhdr.is-today { color: var(--work-dot); font-weight: 700; }
  .wg-dayhdr .wg-daynum { font-size: 16px; font-weight: 600; display: block; letter-spacing: -0.02em; margin-top: 1px; }
  .wg-hlbl {
    font-size: 10px; color: var(--text3); text-align: right;
    padding: 4px 6px 0 0; height: 44px;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
  }
  .wg-cell {
    height: 44px; border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border); position: relative; overflow: hidden;
  }
  .wg-cell:last-child { border-right: none; }
  .wg-cell.is-today { background: rgba(59,111,232,0.03); }
  .wg-event {
    position: absolute; left: 2px; right: 2px; top: 4px;
    border-radius: 5px; padding: 2px 5px;
    font-size: 10px; font-weight: 500; overflow: hidden;
    white-space: nowrap; text-overflow: ellipsis; cursor: pointer;
  }

  /* Modal */
  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 200;
    align-items: center; justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 28px; width: 380px;
    max-width: calc(100vw - 32px); box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: none; } }
  .modal-title { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 20px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; letter-spacing: 0.04em; margin-bottom: 5px; }
  .field input, .field select {
    width: 100%; padding: 9px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-size: 14px;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    outline: none; transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus { border-color: var(--border2); }
  .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 5px; }
  .cat-opt {
    padding: 8px 10px; border-radius: var(--radius-sm);
    font-size: 12px; font-weight: 500; cursor: pointer;
    border: 1.5px solid transparent; text-align: center;
    transition: all 0.15s; font-family: 'DM Sans', sans-serif;
    background: var(--surface2); color: var(--text2);
  }
  .cat-opt.selected { border-color: currentColor; }
  .modal-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; }
  .suggest-link {
    font-size: 12px; color: var(--work-dot); background: none; border: none;
    cursor: pointer; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 4px;
  }
  .suggest-link:hover { opacity: 0.7; }
  .modal-btns { display: flex; gap: 8px; }
  .btn-cancel {
    padding: 8px 16px; font-size: 13px; background: transparent;
    border: 1px solid var(--border2); border-radius: var(--radius-sm);
    cursor: pointer; color: var(--text2); font-family: 'DM Sans', sans-serif;
    transition: background 0.15s;
  }
  .btn-cancel:hover { background: var(--surface2); }
  .btn-save {
    padding: 8px 20px; font-size: 13px; background: var(--text); color: var(--bg);
    border: none; border-radius: var(--radius-sm); cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-weight: 500; transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.85; }

  /* Habits panel */
  .habits-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
  .habit-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 20px;
  }
  .habit-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .habit-name { font-size: 14px; font-weight: 500; }
  .habit-streak { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text3); }
  .habit-days { display: flex; gap: 5px; }
  .habit-day {
    width: 28px; height: 28px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-family: 'DM Mono', monospace;
    cursor: pointer; border: 1px solid var(--border); background: var(--surface2);
    color: var(--text3); transition: all 0.15s;
  }
  .habit-day.done { color: var(--bg); border-color: transparent; }

  /* Notes */
  .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
  .note-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px; min-height: 120px;
  }
  .note-area {
    width: 100%; border: none; background: transparent; resize: none;
    font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--text);
    outline: none; min-height: 80px; line-height: 1.6;
  }
  .note-meta { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-top: 8px; }

  /* Page sections */
  .page-section { display: none; }
  .page-section.active { display: block; }

  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  /* Responsive */
  @media (max-width: 700px) {
    .sidebar { display: none; }
    .main { padding: 20px 16px; }
    .stats-row { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 18 18"><rect x="2" y="2" width="6" height="6" rx="1.5"/><rect x="10" y="2" width="6" height="6" rx="1.5"/><rect x="2" y="10" width="6" height="6" rx="1.5"/><rect x="10" y="10" width="6" height="6" rx="1.5"/></svg>
      </div>
      <span class="logo-text">Life Planner</span>
    </div>

    <nav class="nav-section">
      <div class="nav-label">Views</div>
      <button class="nav-btn active" onclick="showSection('schedule')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><line x1="5" y1="1" x2="5" y2="4"/><line x1="11" y1="1" x2="11" y2="4"/><line x1="2" y1="7" x2="14" y2="7"/></svg>
        Schedule
      </button>
      <button class="nav-btn" onclick="showSection('habits')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><polyline points="5,8 7,10 11,6"/></svg>
        Habits
      </button>
      <button class="nav-btn" onclick="showSection('notes')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><line x1="5" y1="6" x2="11" y2="6"/><line x1="5" y1="9" x2="9" y2="9"/></svg>
        Notes
      </button>
    </nav>

    <div class="nav-section">
      <div class="nav-label">Categories</div>
      <div id="cat-filters"></div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Schedule Section -->
    <section class="page-section active" id="sec-schedule">
      <div class="page-header">
        <div>
          <h1 class="page-title" id="page-title-text">My week</h1>
          <p class="page-date" id="page-date-text"></p>
        </div>
        <div class="header-actions">
          <div class="view-toggle">
            <button class="vt-btn active" id="vt-day" onclick="switchView('day')">Day</button>
            <button class="vt-btn" id="vt-week" onclick="switchView('week')">Week</button>
          </div>
          <button class="add-btn" onclick="openModal()">
            <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
            Add event
          </button>
        </div>
      </div>

      <div class="stats-row" id="stats-row"></div>

      <div class="nav-row">
        <button class="nav-arrow" onclick="navDate(-1)" aria-label="Previous">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9,2 4,7 9,12"/></svg>
        </button>
        <span class="nav-period" id="nav-period-label"></span>
        <button class="nav-arrow" onclick="navDate(1)" aria-label="Next">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="5,2 10,7 5,12"/></svg>
        </button>
        <button class="today-btn" onclick="goToday()">Today</button>
      </div>

      <div id="schedule-view"></div>
    </section>

    <!-- Habits Section -->
    <section class="page-section" id="sec-habits">
      <div class="page-header">
        <div>
          <h1 class="page-title">Habits</h1>
          <p class="page-date">Track your daily streaks</p>
        </div>
        <button class="add-btn" onclick="addHabit()">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
          New habit
        </button>
      </div>
      <div class="habits-grid" id="habits-grid"></div>
    </section>

    <!-- Notes Section -->
    <section class="page-section" id="sec-notes">
      <div class="page-header">
        <div>
          <h1 class="page-title">Notes</h1>
          <p class="page-date">Quick thoughts & ideas</p>
        </div>
        <button class="add-btn" onclick="addNote()">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
          New note
        </button>
      </div>
      <div class="notes-grid" id="notes-grid"></div>
    </section>

  </main>
</div>

<!-- Add Event Modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <div class="modal-title">Add event</div>
    <div class="field">
      <label>EVENT NAME</label>
      <input type="text" id="evt-name" placeholder="e.g. Gym session">
    </div>
    <div class="field">
      <label>DATE</label>
      <input type="date" id="evt-date">
    </div>
    <div class="time-row">
      <div class="field">
        <label>START TIME</label>
        <input type="time" id="evt-start">
      </div>
      <div class="field">
        <label>END TIME</label>
        <input type="time" id="evt-end">
      </div>
    </div>
    <div class="field">
      <label>CATEGORY</label>
      <div class="cat-grid" id="modal-cat-grid"></div>
    </div>
    <div class="modal-footer">
      <button class="suggest-link" onclick="closeModal()">✦ Ask AI for a good time</button>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveEvent()">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
// ─── Data ───────────────────────────────────────────────────────────────────
const CATS = [
  {id:'work',    label:'Work',        dot:'var(--work-dot)',    bg:'var(--work-bg)',    text:'var(--work-text)'},
  {id:'social',  label:'Social',      dot:'var(--social-dot)',  bg:'var(--social-bg)',  text:'var(--social-text)'},
  {id:'gf',      label:'Partner',     dot:'var(--gf-dot)',      bg:'var(--gf-bg)',      text:'var(--gf-text)'},
  {id:'personal',label:'Personal',    dot:'var(--personal-dot)',bg:'var(--personal-bg)',text:'var(--personal-text)'},
  {id:'health',  label:'Health',      dot:'var(--health-dot)',  bg:'var(--health-bg)',  text:'var(--health-text)'},
];

function load(key, def) { try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; } }
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

let events = load('lp_events', [
  {id:1,title:'Morning run',cat:'health',date:'2026-06-01',start:'07:00',end:'07:45'},
  {id:2,title:'Team standup',cat:'work',date:'2026-06-01',start:'09:30',end:'10:00'},
  {id:3,title:'Deep work',cat:'work',date:'2026-06-01',start:'10:00',end:'12:30'},
  {id:4,title:'Lunch with Tom',cat:'social',date:'2026-06-01',start:'13:00',end:'14:00'},
  {id:5,title:'Evening with GF',cat:'gf',date:'2026-06-01',start:'19:00',end:'22:00'},
  {id:6,title:'Read / wind down',cat:'personal',date:'2026-06-01',start:'22:00',end:'23:00'},
  {id:7,title:'Gym',cat:'health',date:'2026-06-02',start:'07:00',end:'08:00'},
  {id:8,title:'Client call',cat:'work',date:'2026-06-02',start:'11:00',end:'12:00'},
  {id:9,title:'Catch-up with Dan',cat:'social',date:'2026-06-03',start:'18:00',end:'20:00'},
  {id:10,title:'Family dinner',cat:'social',date:'2026-06-04',start:'19:00',end:'21:30'},
  {id:11,title:'Me time — film',cat:'personal',date:'2026-06-05',start:'20:00',end:'22:00'},
  {id:12,title:'Date night',cat:'gf',date:'2026-06-06',start:'19:00',end:'23:00'},
  {id:13,title:'Sprint planning',cat:'work',date:'2026-06-03',start:'09:00',end:'10:30'},
]);

let habits = load('lp_habits', [
  {id:1, name:'Morning run', cat:'health', done:{}},
  {id:2, name:'Read 20 mins', cat:'personal', done:{}},
  {id:3, name:'No phone before 9am', cat:'personal', done:{}},
]);

let notes = load('lp_notes', [
  {id:1, text:'Things I want to do this week:', created: new Date().toISOString()},
]);

let nextId = load('lp_nextid', 100);
let activeFilters = new Set(load('lp_filters', CATS.map(c=>c.id)));
let currentView = 'day';
let currentDate = new Date(2026, 5, 1);
let selectedCat = 'work';

// ─── Helpers ─────────────────────────────────────────────────────────────────
function ds(d) { return d.toISOString().slice(0,10); }
function catById(id) { return CATS.find(c=>c.id===id) || CATS[0]; }
function fmtDate(d) { return d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
function fmtShort(d) { return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}); }
function todayStr() { return ds(new Date(2026,5,1)); }

function saveAll() {
  save('lp_events', events);
  save('lp_habits', habits);
  save('lp_notes', notes);
  save('lp_nextid', nextId);
  save('lp_filters', [...activeFilters]);
}

// ─── Navigation ──────────────────────────────────────────────────────────────
function showSection(name) {
  document.querySelectorAll('.page-section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  if(name==='habits') renderHabits();
  if(name==='notes') renderNotes();
}

// ─── Category filters ─────────────────────────────────────────────────────────
function buildCatFilters() {
  const el = document.getElementById('cat-filters');
  el.innerHTML = '';
  CATS.forEach(c => {
    const on = activeFilters.has(c.id);
    const div = document.createElement('div');
    div.className = 'cat-filter' + (on ? '' : ' off');
    div.innerHTML = `<span class="cat-dot" style="background:${c.dot}"></span><span class="cat-filter-label">${c.label}</span>`;
    div.onclick = () => {
      if(activeFilters.has(c.id)) activeFilters.delete(c.id); else activeFilters.add(c.id);
      saveAll(); buildCatFilters(); renderView();
    };
    el.appendChild(div);
  });
}

// ─── Stats ───────────────────────────────────────────────────────────────────
function buildStats() {
  const today = todayStr();
  const wd = currentDate.getDay();
  const mon = new Date(currentDate); mon.setDate(currentDate.getDate()-((wd===0?7:wd)-1));
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  const weekEvts = events.filter(e=>{ const d=new Date(e.date); return d>=mon&&d<=sun; });
  const todayEvts = events.filter(e=>e.date===today);
  const hrs = {}; CATS.forEach(c=>hrs[c.id]=0);
  weekEvts.forEach(e=>{
    if(!e.start||!e.end) return;
    const h = parseInt(e.end.split(':')[0]) - parseInt(e.start.split(':')[0]);
    hrs[e.cat] = (hrs[e.cat]||0) + Math.max(0,h);
  });
  const top = Object.entries(hrs).sort((a,b)=>b[1]-a[1])[0];
  const cat = top ? catById(top[0]) : null;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-label">TODAY</div><div class="stat-val">${todayEvts.length}</div><div class="stat-sub">events</div></div>
    <div class="stat-card"><div class="stat-label">THIS WEEK</div><div class="stat-val">${weekEvts.length}</div><div class="stat-sub">events</div></div>
    <div class="stat-card"><div class="stat-label">FOCUS AREA</div><div class="stat-val" style="font-size:16px;margin-top:6px;color:${cat?cat.dot:'var(--text3)'}">${cat?cat.label:'—'}</div><div class="stat-sub">${cat?top[1]+'h this week':''}</div></div>
  `;
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderView() {
  buildStats();
  const isToday = ds(currentDate) === todayStr();
  document.getElementById('page-title-text').textContent = currentView==='week' ? 'My week' : (isToday ? 'Today' : fmtShort(currentDate));
  document.getElementById('page-date-text').textContent = currentView==='week' ? weekRangeLabel() : fmtDate(currentDate);
  document.getElementById('nav-period-label').textContent = currentView==='week' ? weekRangeLabel() : fmtShort(currentDate);
  if(currentView==='day') renderDay(); else renderWeek();
}

function renderDay() {
  const container = document.getElementById('schedule-view');
  const dayEvts = events.filter(e=>e.date===ds(currentDate) && activeFilters.has(e.cat));
  const hours = Array.from({length:17},(_,i)=>i+7);
  let html = '<div class="day-grid">';
  hours.forEach(h=>{
    const hEvts = dayEvts.filter(e=>parseInt((e.start||'00:00').split(':')[0])===h);
    const lbl = h===12?'12pm':h>12?(h-12)+'pm':h+'am';
    html += `<div class="hour-row"><div class="hour-lbl">${lbl}</div><div class="hour-body">`;
    hEvts.forEach(e=>{
      const c = catById(e.cat);
      html += `<button class="event-chip" style="background:${c.bg};color:${c.text}" onclick="removeEvt(${e.id})">
        <span class="event-chip-title">${e.title}</span>
        <span class="event-chip-time">${e.start}–${e.end}</span>
      </button>`;
    });
    html += `</div></div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

function renderWeek() {
  const container = document.getElementById('schedule-view');
  const wd = currentDate.getDay();
  const mon = new Date(currentDate); mon.setDate(currentDate.getDate()-((wd===0?7:wd)-1));
  const days = Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
  const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const hours = Array.from({length:14},(_,i)=>i+8);
  let html = '<div class="week-grid-wrap"><div class="week-grid"><div class="wg-corner"></div>';
  days.forEach((d,i)=>{
    const isToday = ds(d)===todayStr();
    html += `<div class="wg-dayhdr${isToday?' is-today':''}">${dayNames[i]}<span class="wg-daynum">${d.getDate()}</span></div>`;
  });
  hours.forEach(h=>{
    const lbl = h===12?'12p':h>12?(h-12)+'p':h+'a';
    html += `<div class="wg-hlbl">${lbl}</div>`;
    days.forEach(d=>{
      const isToday = ds(d)===todayStr();
      const evts = events.filter(e=>e.date===ds(d) && activeFilters.has(e.cat) && parseInt((e.start||'00').split(':')[0])===h);
      html += `<div class="wg-cell${isToday?' is-today':''}">`;
      evts.forEach(e=>{
        const c=catById(e.cat);
        html += `<div class="wg-event" style="background:${c.bg};color:${c.text}" title="${e.title} ${e.start}–${e.end}" onclick="removeEvt(${e.id})">${e.title}</div>`;
      });
      html += `</div>`;
    });
  });
  html += '</div></div>';
  container.innerHTML = html;
}

function weekRangeLabel() {
  const wd = currentDate.getDay();
  const mon = new Date(currentDate); mon.setDate(currentDate.getDate()-((wd===0?7:wd)-1));
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  return `${mon.getDate()} – ${sun.getDate()} ${sun.toLocaleString('en-GB',{month:'long'})} ${sun.getFullYear()}`;
}

function switchView(v) {
  currentView = v;
  document.getElementById('vt-day').className = 'vt-btn'+(v==='day'?' active':'');
  document.getElementById('vt-week').className = 'vt-btn'+(v==='week'?' active':'');
  renderView();
}

function navDate(dir) {
  if(currentView==='day') currentDate.setDate(currentDate.getDate()+dir);
  else currentDate.setDate(currentDate.getDate()+dir*7);
  renderView();
}

function goToday() { currentDate = new Date(2026,5,1); renderView(); }
function removeEvt(id) { if(confirm('Remove this event?')){ events=events.filter(e=>e.id!==id); saveAll(); renderView(); } }

// ─── Modal ───────────────────────────────────────────────────────────────────
function openModal(prefillH) {
  document.getElementById('evt-date').value = ds(currentDate);
  if(prefillH!==undefined){
    document.getElementById('evt-start').value = String(prefillH).padStart(2,'0')+':00';
    document.getElementById('evt-end').value = String(prefillH+1).padStart(2,'0')+':00';
  }
  const grid = document.getElementById('modal-cat-grid');
  grid.innerHTML = '';
  CATS.forEach(c=>{
    const div = document.createElement('div');
    div.className = 'cat-opt'+(selectedCat===c.id?' selected':'');
    div.style.background = selectedCat===c.id ? c.bg : 'var(--surface2)';
    div.style.color = selectedCat===c.id ? c.text : 'var(--text2)';
    div.style.borderColor = selectedCat===c.id ? c.dot : 'transparent';
    div.textContent = c.label;
    div.onclick = ()=>{ selectedCat=c.id; openModal(); };
    grid.appendChild(div);
  });
  document.getElementById('modal-backdrop').className = 'modal-backdrop open';
}

function closeModal() { document.getElementById('modal-backdrop').className = 'modal-backdrop'; }

function saveEvent() {
  const name = document.getElementById('evt-name').value.trim();
  if(!name) return;
  events.push({
    id: nextId++,
    title: name,
    cat: selectedCat,
    date: document.getElementById('evt-date').value,
    start: document.getElementById('evt-start').value,
    end: document.getElementById('evt-end').value,
  });
  document.getElementById('evt-name').value = '';
  saveAll(); closeModal(); renderView();
}

document.getElementById('modal-backdrop').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });

// ─── Habits ──────────────────────────────────────────────────────────────────
function renderHabits() {
  const grid = document.getElementById('habits-grid');
  if(!habits.length){ grid.innerHTML='<div class="empty"><div class="empty-icon">✓</div><div class="empty-text">No habits yet — add one above</div></div>'; return; }
  const today = new Date(2026,5,1);
  const week = Array.from({length:7},(_,i)=>{ const d=new Date(today); d.setDate(today.getDate()-6+i); return d; });
  grid.innerHTML = '';
  habits.forEach(h => {
    const c = catById(h.cat);
    const streak = calcStreak(h);
    const card = document.createElement('div');
    card.className = 'habit-card';
    card.innerHTML = `
      <div class="habit-top">
        <div class="habit-name">${h.name}</div>
        <div class="habit-streak" style="color:${c.dot}">🔥 ${streak}</div>
      </div>
      <div class="habit-days" id="hdays-${h.id}"></div>
    `;
    grid.appendChild(card);
    const daysEl = document.getElementById('hdays-'+h.id);
    week.forEach(d => {
      const key = ds(d);
      const done = !!(h.done||{})[key];
      const btn = document.createElement('div');
      btn.className = 'habit-day'+(done?' done':'');
      btn.style.background = done ? c.dot : 'var(--surface2)';
      btn.title = d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric'});
      btn.textContent = d.getDate();
      btn.onclick = ()=>{ h.done[key]=!h.done[key]; saveAll(); renderHabits(); };
      daysEl.appendChild(btn);
    });
  });
}

function calcStreak(h) {
  let streak = 0;
  const base = new Date(2026,5,1);
  for(let i=0;i<365;i++){
    const d = new Date(base); d.setDate(base.getDate()-i);
    if((h.done||{})[ds(d)]) streak++; else break;
  }
  return streak;
}

function addHabit() {
  const name = prompt('Habit name?');
  if(!name) return;
  const catName = prompt('Category? (work / social / gf / personal / health)', 'health');
  habits.push({id:nextId++, name, cat:catName||'health', done:{}});
  saveAll(); renderHabits();
}

// ─── Notes ───────────────────────────────────────────────────────────────────
function renderNotes() {
  const grid = document.getElementById('notes-grid');
  grid.innerHTML = '';
  if(!notes.length){ grid.innerHTML='<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">No notes yet</div></div>'; return; }
  notes.forEach(n=>{
    const card = document.createElement('div');
    card.className = 'note-card';
    const ta = document.createElement('textarea');
    ta.className = 'note-area';
    ta.value = n.text;
    ta.placeholder = 'Type a note...';
    ta.oninput = ()=>{ n.text=ta.value; saveAll(); };
    const meta = document.createElement('div');
    meta.className = 'note-meta';
    meta.textContent = new Date(n.created).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    card.appendChild(ta); card.appendChild(meta);
    grid.appendChild(card);
  });
}

function addNote() {
  notes.unshift({id:nextId++, text:'', created:new Date().toISOString()});
  saveAll(); renderNotes();
  document.querySelector('.note-area').focus();
}

// ─── Init ────────────────────────────────────────────────────────────────────
buildCatFilters();
renderView();
</script>
</body>
</html>
